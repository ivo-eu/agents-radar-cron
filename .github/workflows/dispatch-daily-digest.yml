name: Dispatch agents-radar daily digest

# 为什么存在这个仓库:
# 目标仓库 ivo-eu/agents-radar 是 fork,GitHub 对 fork 的 scheduled(cron)事件
# 做低优先级派发,经常被静默丢弃(实测 2026-06-15 后日报定时 0 次触发,而上游
# 非 fork 仓库同样的 cron 天天准点)。
# 本仓库是【独立非 fork】仓库,它的 cron 派发可靠;它每天定点用 workflow_dispatch
# 去远程触发 fork 的日报(dispatch 是显式事件,不受 fork cron 限流)。
# 详见 agents-radar/定时爬取诊断与交接.md。

on:
  schedule:
    # [临时验证 2026-06-18 public 后] 17:05 北京 = 09:05 UTC,验证 public 仓 cron 能否自动触发。
    # 验证通过后必须改回 "17 23 * * *"(= 次日 07:17 北京)。
    - cron: "5 9 * * *"
  workflow_dispatch: {}

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily digest on the fork
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          echo "Dispatching weekly-digest.yml (job=daily) on ivo-eu/agents-radar@master ..."
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ivo-eu/agents-radar/actions/workflows/weekly-digest.yml/dispatches \
            -d '{"ref":"master","inputs":{"job":"daily"}}'
          echo "Dispatch request accepted (HTTP 204 = success, no body)."
